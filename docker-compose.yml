x-airflow-common: &airflow-common
  image: apache/airflow:3.1.3-python3.13
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:?Defina AIRFLOW_DB_PASSWORD no .env}@airflow-db/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY:?Defina AIRFLOW_SECRET_KEY no .env}
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: 'admin:${AIRFLOW_ADMIN_PASSWORD:?Defina AIRFLOW_ADMIN_PASSWORD no .env}'
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-webserver:8080/execution'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:?Defina AIRFLOW_JWT_SECRET no .env}
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
  depends_on:
    airflow-db:
      condition: service_healthy

services:

  # ── Aplicação B3 ──────────────────────────────────────────────────────────
  post-trade-mkt:
    build: .
    container_name: post-trade-mkt
    ports:
      - "8000:8000"
    volumes:
      - ./downloads:/app/downloads
      - ./extraidos:/app/extraidos
    environment:
      SRC_DOWNLOADS: /app/downloads
      SRC_EXTRAIDOS: /app/extraidos

  # ── Banco de dados do Airflow ─────────────────────────────────────────────
  airflow-db:
    image: postgres:16
    container_name: airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:?Defina AIRFLOW_DB_PASSWORD no .env}
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Inicialização do Airflow (roda uma vez) ───────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - airflow db migrate
    restart: on-failure

  # ── Interface Web + API do Airflow ────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: api-server
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── DAG Processor do Airflow (Airflow 3.x) ───────────────────────────────
  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    command: dag-processor

  # ── Scheduler do Airflow ──────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler

volumes:
  airflow-db-data:
  airflow-logs:
